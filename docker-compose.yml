services:
  db:
    image: mysql:8.0
    container_name: asistencia_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: asistencia_virtual
    volumes:
      - db_data:/var/lib/mysql
      - ./asistencia_virtual/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "3306:3306"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asistencia_web
    depends_on:
      - db
    volumes:
      - ./asistencia_virtual/app:/var/www/html
    ports:
      - "8080:80"

volumes:
  db_data:
